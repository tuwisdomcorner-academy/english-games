
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Irregular Verbs Level 1</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#4facfe,#00f2fe);display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#fff;width:min(800px,95%);padding:30px;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,.25)}
h1{margin:0;color:#1565c0}button{background:#1565c0;color:#fff;border:0;padding:12px 25px;border-radius:10px;font-size:18px;cursor:pointer}
select{font-size:18px;padding:10px;width:100%;margin:20px 0}
#bar{height:12px;background:#ddd;border-radius:20px;overflow:hidden}#fill{height:100%;width:0;background:#4caf50}
.good{color:#0a8a0a}.bad{color:#d32f2f}
</style></head><body>
<div class="card">
<div id="start">
<h1>🏆 Irregular Verbs - Level 1</h1>
<p>30 Questions</p>
<button onclick="start()">Start Game</button>
</div>
<div id="game" style="display:none">
<div id="bar"><div id="fill"></div></div>
<p id="counter"></p><h2 id="sentence"></h2>
<select id="sel"></select><br>
<button onclick="check()">Check</button>
<div id="fb"></div>
<button id="next" onclick="nextQ()" style="display:none;margin-top:15px">Next ➜</button>
</div>
<div id="end" style="display:none"></div>
</div>
<script>
const qs=[{'sentence': 'I _____ my keys yesterday.', 'answer': 'found', 'meaning': 'encontrar', 'example': 'I found my keys yesterday.', 'options': ['find', 'found', 'founded']}, {'sentence': 'She _____ a new job last week.', 'answer': 'got', 'meaning': 'conseguir', 'example': 'She got a new job last week.', 'options': ['get', 'got', 'finded']}, {'sentence': 'They _____ the picture on the wall.', 'answer': 'hung', 'meaning': 'colgar', 'example': 'They hung the picture on the wall.', 'options': ['hang', 'hung', 'finded']}, {'sentence': 'We _____ dinner at 8.', 'answer': 'had', 'meaning': 'tener', 'example': 'We had dinner at 8.', 'options': ['have', 'had', 'finded']}, {'sentence': 'I _____ a strange noise.', 'answer': 'heard', 'meaning': 'oír', 'example': 'I heard a strange noise.', 'options': ['hear', 'heard', 'finded']}, {'sentence': 'He _____ the baby carefully.', 'answer': 'held', 'meaning': 'sostener', 'example': 'He held the baby carefully.', 'options': ['hold', 'held', 'finded']}, {'sentence': 'She _____ the letter.', 'answer': 'kept', 'meaning': 'guardar', 'example': 'She kept the letter.', 'options': ['keep', 'kept', 'finded']}, {'sentence': 'The knight _____ before the king.', 'answer': 'knelt', 'meaning': 'arrodillarse', 'example': 'The knight knelt before the king.', 'options': ['kneel', 'knelt', 'finded']}, {'sentence': 'She _____ the book on the table.', 'answer': 'laid', 'meaning': 'poner', 'example': 'She laid the book on the table.', 'options': ['lay', 'laid', 'finded']}, {'sentence': 'The teacher _____ the class.', 'answer': 'led', 'meaning': 'guiar', 'example': 'The teacher led the class.', 'options': ['lead', 'led', 'finded']}, {'sentence': 'He _____ against the wall.', 'answer': 'leant', 'meaning': 'apoyarse', 'example': 'He leant against the wall.', 'options': ['lean', 'leant', 'finded']}, {'sentence': 'The cat _____ over the fence.', 'answer': 'leapt', 'meaning': 'saltar', 'example': 'The cat leapt over the fence.', 'options': ['leap', 'leapt', 'finded']}, {'sentence': 'They _____ English.', 'answer': 'learnt', 'meaning': 'aprender', 'example': 'They learnt English.', 'options': ['learn', 'learnt', 'finded']}, {'sentence': 'We _____ home early.', 'answer': 'left', 'meaning': 'dejar', 'example': 'We left home early.', 'options': ['leave', 'left', 'finded']}, {'sentence': 'She _____ me some money.', 'answer': 'lent', 'meaning': 'prestar', 'example': 'She lent me some money.', 'options': ['lend', 'lent', 'finded']}, {'sentence': 'I _____ my keys yesterday.', 'answer': 'found', 'meaning': 'encontrar', 'example': 'I found my keys yesterday.', 'options': ['find', 'found', 'founded']}, {'sentence': 'She _____ a new job last week.', 'answer': 'got', 'meaning': 'conseguir', 'example': 'She got a new job last week.', 'options': ['get', 'got', 'finded']}, {'sentence': 'They _____ the picture on the wall.', 'answer': 'hung', 'meaning': 'colgar', 'example': 'They hung the picture on the wall.', 'options': ['hang', 'hung', 'finded']}, {'sentence': 'We _____ dinner at 8.', 'answer': 'had', 'meaning': 'tener', 'example': 'We had dinner at 8.', 'options': ['have', 'had', 'finded']}, {'sentence': 'I _____ a strange noise.', 'answer': 'heard', 'meaning': 'oír', 'example': 'I heard a strange noise.', 'options': ['hear', 'heard', 'finded']}, {'sentence': 'He _____ the baby carefully.', 'answer': 'held', 'meaning': 'sostener', 'example': 'He held the baby carefully.', 'options': ['hold', 'held', 'finded']}, {'sentence': 'She _____ the letter.', 'answer': 'kept', 'meaning': 'guardar', 'example': 'She kept the letter.', 'options': ['keep', 'kept', 'finded']}, {'sentence': 'The knight _____ before the king.', 'answer': 'knelt', 'meaning': 'arrodillarse', 'example': 'The knight knelt before the king.', 'options': ['kneel', 'knelt', 'finded']}, {'sentence': 'She _____ the book on the table.', 'answer': 'laid', 'meaning': 'poner', 'example': 'She laid the book on the table.', 'options': ['lay', 'laid', 'finded']}, {'sentence': 'The teacher _____ the class.', 'answer': 'led', 'meaning': 'guiar', 'example': 'The teacher led the class.', 'options': ['lead', 'led', 'finded']}, {'sentence': 'He _____ against the wall.', 'answer': 'leant', 'meaning': 'apoyarse', 'example': 'He leant against the wall.', 'options': ['lean', 'leant', 'finded']}, {'sentence': 'The cat _____ over the fence.', 'answer': 'leapt', 'meaning': 'saltar', 'example': 'The cat leapt over the fence.', 'options': ['leap', 'leapt', 'finded']}, {'sentence': 'They _____ English.', 'answer': 'learnt', 'meaning': 'aprender', 'example': 'They learnt English.', 'options': ['learn', 'learnt', 'finded']}, {'sentence': 'We _____ home early.', 'answer': 'left', 'meaning': 'dejar', 'example': 'We left home early.', 'options': ['leave', 'left', 'finded']}, {'sentence': 'She _____ me some money.', 'answer': 'lent', 'meaning': 'prestar', 'example': 'She lent me some money.', 'options': ['lend', 'lent', 'finded']}];
let i=0,score=0;
function start(){document.getElementById('start').style.display='none';document.getElementById('game').style.display='block';show();}
function show(){
 let q=qs[i];
 document.getElementById('counter').textContent=`Question ${i+1} / ${qs.length} | ⭐ Score: ${score}`;
 document.getElementById('fill').style.width=((i)/qs.length*100)+'%';
 document.getElementById('sentence').textContent=q.sentence;
 let s=document.getElementById('sel');s.innerHTML='<option value="">Choose...</option>';
 q.options.sort(()=>Math.random()-0.5).forEach(o=>s.innerHTML+=`<option>${o}</option>`);
 document.getElementById('fb').innerHTML='';document.getElementById('next').style.display='none';
}
function check(){
 let q=qs[i],v=document.getElementById('sel').value;
 if(!v)return;
 if(v===q.answer){score++;document.getElementById('fb').innerHTML=`<p class='good'>✅ Correct!</p><b>${q.answer}</b><br>Meaning: ${q.meaning}<br><i>${q.example}</i>`;}
 else{document.getElementById('fb').innerHTML=`<p class='bad'>❌ Incorrect</p>Correct answer: <b>${q.answer}</b><br>Meaning: ${q.meaning}<br><i>${q.example}</i><br><br>💪 Keep going!`;}
 document.getElementById('next').style.display='inline-block';
}
function nextQ(){
 i++;
 if(i>=qs.length){
 document.getElementById('game').style.display='none';
 let pct=Math.round(score/qs.length*100);
 let medal=pct==100?'🏆 Master':pct>=90?'🥇 Gold':pct>=75?'🥈 Silver':'🥉 Bronze';
 document.getElementById('end').style.display='block';
 document.getElementById('end').innerHTML=`<h1>Finished!</h1><h2>${score} / ${qs.length}</h2><h2>${pct}%</h2><h1>${medal}</h1><button onclick='location.reload()'>Play Again</button>`;
 return;
 }
 show();
}
</script>
</body></html>
